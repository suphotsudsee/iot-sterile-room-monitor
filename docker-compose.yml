services:
  sterile-room-monitor:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATA_DIR: /app/data
      ADMIN_EMAIL: admin@phoubon.in.th
      ADMIN_PASSWORD: admin123
    volumes:
      - sterile-room-monitor-data:/app/data
    restart: unless-stopped

volumes:
  sterile-room-monitor-data:
