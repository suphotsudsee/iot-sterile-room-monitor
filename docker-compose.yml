services:
  sterile-room-monitor:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATA_DIR: /app/data
      ADMIN_EMAIL: admin@phoubon.in.th
      ADMIN_PASSWORD: admin123
      APP_PUBLIC_URL: http://ymxbo5qt3r0g1nnlv5u0q7v6.110.164.222.217.sslip.io
      ALERT_WEBHOOK_URL: ""
      ALERT_WEBHOOK_TOKEN: ""
      ALERT_COOLDOWN_MINUTES: "30"
      MQTT_ENABLED: "true"
      MQTT_URL: mqtt://mqtt-broker:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-sterile_iot}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change-this-mqtt-password}
      MQTT_TOPIC: hospitals/+/rooms/+/devices/+/readings
    volumes:
      - sterile-room-monitor-data:/app/data
    depends_on:
      - mqtt-broker
    restart: unless-stopped

  mqtt-broker:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-sterile_iot}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change-this-mqtt-password}
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - sterile-room-mqtt-data:/mosquitto/data
      - sterile-room-mqtt-log:/mosquitto/log
    command: >
      sh -c "mosquitto_passwd -b -c /mosquitto/data/password_file \"$${MQTT_USERNAME}\" \"$${MQTT_PASSWORD}\" &&
      mosquitto -c /mosquitto/config/mosquitto.conf"
    restart: unless-stopped

volumes:
  sterile-room-monitor-data:
  sterile-room-mqtt-data:
  sterile-room-mqtt-log:
